services:
  mysql:
    image: mysql:8.0
    container_name: hm-dianping-mysql
    restart: unless-stopped
    ports:
      - "13306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: hmdp
      TZ: Asia/Shanghai
    volumes:
      - dp-mysql-data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
      - --default-authentication-plugin=mysql_native_password

  redis:
    image: redis:7.4.8
    container_name: hm-dianping-redis
    restart: unless-stopped
    ports:
      - "16379:6379"
    volumes:
      - dp-redis-data:/data
    command: ["redis-server", "--appendonly", "yes"]

volumes:
  dp-mysql-data:
    external: true
    name: dp-mysql-data
  dp-redis-data:
    external: true
    name: dp-redis-data
